<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loader</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .loader-wrap {
    width: 160px;
    height: 20px;
    overflow: hidden;
  }
</style>
</head>
<body>

<div class="loader-wrap">
  <svg
    xmlns="http://www.w3.org/2000/svg"
    width="160"
    height="20"
    viewBox="0 0 128 16">

    <!-- 10 dot grigi statici -->
    <path
      fill="#9ab4ca"
      fill-opacity="0.42"
      d="M6.4,4.8A3.2,3.2,0,1,1,3.2,8,3.2,3.2,0,0,1,6.4,4.8Z
         M19.2,4.8A3.2,3.2,0,1,1,16,8,3.2,3.2,0,0,1,19.2,4.8Z
         M32,4.8A3.2,3.2,0,1,1,28.8,8,3.2,3.2,0,0,1,32,4.8Z
         M44.8,4.8A3.2,3.2,0,1,1,41.6,8,3.2,3.2,0,0,1,44.8,4.8Z
         M57.6,4.8A3.2,3.2,0,1,1,54.4,8,3.2,3.2,0,0,1,57.6,4.8Z
         M70.4,4.8A3.2,3.2,0,1,1,67.2,8,3.2,3.2,0,0,1,70.4,4.8Z
         M83.2,4.8A3.2,3.2,0,1,1,80,8,3.2,3.2,0,0,1,83.2,4.8Z
         M96,4.8A3.2,3.2,0,1,1,92.8,8,3.2,3.2,0,0,1,96,4.8Z
         M108.8,4.8A3.2,3.2,0,1,1,105.6,8,3.2,3.2,0,0,1,108.8,4.8Z
         M121.6,4.8A3.2,3.2,0,1,1,118.4,8,3.2,3.2,0,0,1,121.6,4.8Z" />

    <!-- 3 dot blu animati: trailing piccolo → leading grande (effetto cometa).
         Partono fuori schermo a sinistra e scorrono verso destra in step discreti,
         poi ricominciano dall'inizio — nessun bounce, wrap stile Pac-Man. -->
    <g fill="#4D82B8">
      <circle cx="-42.7" cy="8" r="4.16" />
      <circle cx="-29.9" cy="8" r="4.80" />
      <circle cx="-17.1" cy="8" r="5.44" />

      <animateTransform
        attributeName="transform"
        type="translate"
        values="23 0;36 0;49 0;62 0;74.5 0;87.5 0;100 0;113 0;125.5 0;138.5 0;151.5 0;164.5 0;178 0"
        calcMode="discrete"
        dur="1170ms"
        repeatCount="indefinite" />
    </g>

  </svg>
</div>

</body>
</html>
